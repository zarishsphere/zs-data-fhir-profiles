name: CI — zs-data-fhir-profiles

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sushi-compile:
    name: SUSHI compile FSH → FHIR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install SUSHI
        run: npm install -g fsh-sushi
      - name: Compile FSH profiles
        run: sushi .
      - name: Upload generated IG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fhir-ig-generated
          path: fsh-generated/

  fhir-validate:
    name: Validate generated FHIR profiles
    runs-on: ubuntu-latest
    needs: sushi-compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: actions/download-artifact@v4
        with: { name: fhir-ig-generated, path: fsh-generated/ }
      - name: Download HAPI FHIR Validator CLI
        run: |
          curl -fsSL \
            https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar \
            -o validator_cli.jar
      - name: Validate StructureDefinitions
        run: |
          if ls fsh-generated/resources/StructureDefinition-*.json 1>/dev/null 2>&1; then
            java -jar validator_cli.jar -version 5.0.0 fsh-generated/resources/StructureDefinition-*.json
          else
            echo "No generated StructureDefinitions found"
          fi
      - name: Validate example instances
        run: |
          if ls fsh-generated/resources/Patient-*.json 1>/dev/null 2>&1; then
            java -jar validator_cli.jar -version 5.0.0 \
              -profile https://fhir.zarishsphere.com/StructureDefinition/ZSPatient \
              fsh-generated/resources/Patient-*.json
          fi

  ig-publisher:
    name: Publish FHIR IG to GitHub Pages
    runs-on: ubuntu-latest
    needs: fhir-validate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - run: npm install -g fsh-sushi
      - run: sushi .
      - name: Download IG Publisher
        run: |
          curl -fsSL \
            https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o publisher.jar
      - name: Run IG Publisher
        run: java -jar publisher.jar -ig ig.ini
        continue-on-error: true
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          destination_dir: fhir-ig
